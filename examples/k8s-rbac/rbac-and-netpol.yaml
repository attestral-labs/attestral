# Single multi-document manifest that mixes RBAC and NetworkPolicy kinds, to
# exercise the ingester's multi-doc handling across the new component types:
#   - Role / ClusterRole          -> k8s_rbac_role
#   - RoleBinding / ClusterRoleBinding -> k8s_rbac_binding
#   - NetworkPolicy               -> k8s_network_policy
# No pod-bearing kinds here; the ingester picks each doc up on its own.
---
# Namespaced Role that grants read over secrets (CIS 5.1.x least-privilege).
# _grants_secrets: true, _wildcard_verbs/_wildcard_resources: false, namespace: app
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: app
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
# Over-broad ClusterRole: wildcard verbs AND wildcard resources.
# _wildcard_verbs: true, _wildcard_resources: true, _is_cluster_role: true
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildcard-admin
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
# Namespaced binding to the secret-reader Role (not cluster-admin, not cluster-scoped).
# _binds_cluster_admin: false, _is_cluster_scope: false
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-secret-reader
  namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: secret-reader
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: app
---
# Cluster-scoped binding straight to the built-in cluster-admin (CIS 5.1.1).
# _binds_cluster_admin: true, _is_cluster_scope: true
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bind-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ci-bot
    namespace: app
---
# Namespace-wide default-deny ingress: empty podSelector + Ingress policyType.
# _is_default_deny: true, _namespace: app
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: app
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
---
# Targeted allow policy: a non-empty podSelector, so NOT a default-deny.
# _is_default_deny: false, _namespace: app
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
